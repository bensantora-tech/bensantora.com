<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ if .IsHome }}Ben Santora | Linux &amp; Go{{ else }}{{ .Title }} | Ben Santora{{ end }}</title>
<meta name="description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta name="author" content="Ben Santora">

<meta property="og:title" content="{{ if .IsHome }}Ben Santora{{ else }}{{ .Title }}{{ end }}">
<meta property="og:description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
<meta property="og:site_name" content="Ben Santora">

<link rel="alternate" type="application/rss+xml" title="Ben Santora" href="/index.xml">
<link rel="alternate" type="application/rss+xml" title="Posts — Ben Santora" href="/posts/index.xml">

<style>
/* ── Reset & Base ────────────────────────────────── */
:root {
    --green:   #98c9a3;
    --text:    #e0e0e0;
    --bg:      #0d0d0d;
    --card-bg: #1e1e1e;
    --border:  #2a2a2a;
    --muted:   #666;
    --dim:     #888;
}
*, *::before, *::after { box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.7;
    color: var(--text);
    background: var(--bg);
    margin: 0;
    padding: 0;
    font-size: 1.3rem;
}

/* ── Site Header ─────────────────────────────────── */
.site-header {
    border-bottom: 3px solid var(--green);
    text-align: center;
    padding: 28px 20px 18px;
}
.site-header h1 { margin: 0; font-size: 2.2rem; }
.site-header h1 a { color: var(--green); text-decoration: none; }
.site-header h1 a:hover { color: white; text-decoration: none; }
.site-header p { margin: 4px 0 0; }

/* ── Mobile Nav (shown < 860px) ──────────────────── */
.mobile-nav {
    display: none;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
}
.mobile-nav a {
    display: inline-block;
    color: var(--dim);
    text-decoration: none;
    font-weight: normal;
    padding: 10px 14px;
    font-size: 0.9rem;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
}
.mobile-nav a:hover,
.mobile-nav a.active {
    color: var(--green);
    border-bottom-color: var(--green);
    text-decoration: none;
}

/* ── Three-column Grid ───────────────────────────── */
.site-grid {
    display: grid;
    grid-template-columns: 190px minmax(0, 880px);
    column-gap: 40px;
    max-width: 1190px;
    margin: 0 auto;
    padding: 40px 20px;
    align-items: start;
}
/* Three columns only on single content pages */
.page-kind-page .site-grid {
    grid-template-columns: 190px minmax(0, 880px) 210px;
    max-width: 1400px;
}
.right-sidebar { display: none; }
.page-kind-page .right-sidebar { display: block; }

/* ── Left Sidebar ────────────────────────────────── */
.left-sidebar {
    position: sticky;
    top: 40px;
}
.left-nav { display: flex; flex-direction: column; }
.nav-label {
    font-size: 0.965rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #444;
    padding: 14px 10px 4px;
    user-select: none;
}
.left-nav a {
    color: var(--dim);
    text-decoration: none;
    font-weight: normal;
    padding: 6px 10px;
    font-size: 1.175rem;
    border-left: 2px solid transparent;
    line-height: 1.4;
}
.left-nav a:hover {
    color: var(--green);
    border-left-color: var(--green);
    text-decoration: none;
}
.left-nav a.active {
    color: var(--green);
    border-left-color: var(--green);
    font-weight: 600;
}

/* ── Right Sidebar ───────────────────────────────── */
.right-sidebar {
    position: sticky;
    top: 40px;
}
.sidebar-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #444;
    margin: 0 0 8px;
    padding-left: 10px;
}
/* Hugo-generated TOC */
#TableOfContents ul {
    list-style: none;
    padding: 0;
    margin: 0;
}
#TableOfContents li { margin: 0; }
#TableOfContents a {
    display: block;
    color: var(--dim);
    text-decoration: none;
    font-weight: normal;
    font-size: 0.86rem;
    padding: 3px 0 3px 10px;
    border-left: 2px solid transparent;
    line-height: 1.5;
}
#TableOfContents a:hover {
    color: var(--green);
    border-left-color: var(--green);
    text-decoration: none;
}

/* ── Content ─────────────────────────────────────── */
.content { min-width: 0; }

/* Typography */
h1 { color: var(--green); font-size: 1.85rem; line-height: 1.3; margin-top: 0; }
h2 { color: var(--green); border-left: 5px solid var(--green); padding-left: 15px; margin-top: 2.5rem; }
h3 { color: var(--green); padding-left: 22px; }
a { color: var(--green); text-decoration: none; font-weight: bold; }
a:hover { text-decoration: underline; color: white; }
p { margin-bottom: 1.2rem; }
strong { color: white; }
hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
ul, ol { padding-left: 1.5rem; }
li { margin-bottom: 0.4rem; }

/* Code */
pre {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-left: 4px solid var(--green);
    padding: 16px 20px;
    overflow-x: auto;
    border-radius: 4px;
    margin: 1.5rem 0;
}
code {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 0.88rem;
    color: var(--green);
}
pre code { color: var(--text); background: none; }

/* Post meta & back link */
.post-meta {
    color: var(--muted);
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
}
.back-link {
    display: inline-block;
    color: var(--muted);
    font-weight: normal;
    margin-bottom: 0.6rem;
}
.back-link:hover { color: var(--green); text-decoration: none; }

/* Tags */
.post-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.tag {
    font-size: 0.76rem;
    color: var(--dim);
    background: var(--card-bg);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 3px;
    font-weight: normal;
    text-decoration: none;
}
.tag:hover { color: var(--green); border-color: var(--green); text-decoration: none; }

/* Cards */
.card-list { list-style: none; padding: 0; margin: 0; }
.card {
    background: var(--card-bg);
    padding: 18px 22px;
    margin-bottom: 12px;
    border-radius: 4px;
    border: 1px solid var(--border);
    box-shadow: 0 2px 8px rgba(0,0,0,0.35);
}
.card-title { }
.card-title a { color: var(--green); }
.card p {
    color: var(--text);
    margin: 10px 0 0;
    line-height: 1.6;
    font-weight: normal;
}
.card-meta { color: var(--muted); margin-top: 8px; }

/* Bio card (homepage) */
.bio-card {
    background: var(--card-bg);
    padding: 22px 26px;
    margin-bottom: 24px;
    border-radius: 4px;
    border: 1px solid var(--border);
    box-shadow: 0 2px 8px rgba(0,0,0,0.35);
}
.bio-card p { margin-bottom: 0.9rem; }
.bio-card p:last-child { margin-bottom: 0; }

/* Section intro */
.section-intro {
    color: var(--dim);
    border-left: 3px solid var(--border);
    padding-left: 16px;
    margin-bottom: 2rem;
    line-height: 1.6;
}
.section-intro p { margin-bottom: 0.6rem; }
.section-intro p:last-child { margin-bottom: 0; }

/* ── Footer ──────────────────────────────────────── */
.site-footer {
    border-top: 1px solid var(--border);
    padding: 14px 20px;
    margin-top: 10px;
    color: var(--muted);
    font-size: 0.88rem;
    text-align: center;
}
.site-footer a { color: var(--muted); font-weight: normal; }
.site-footer a:hover { color: var(--green); text-decoration: none; }

/* ── Responsive ──────────────────────────────────── */
@media (max-width: 1340px) {
    .page-kind-page .right-sidebar { display: none; }
    .page-kind-page .site-grid {
        grid-template-columns: 190px minmax(0, 880px);
        max-width: 1190px;
    }
}
@media (max-width: 860px) {
    .site-grid,
    .page-kind-page .site-grid {
        grid-template-columns: 1fr;
        padding: 24px 20px;
        max-width: 100%;
    }
    .left-sidebar { display: none; }
    .mobile-nav { display: flex; }
    body { font-size: 1.25rem; }
}
</style>
